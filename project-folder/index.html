<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Webpage</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Welcome to My Webpage</h1>

    <p>
      This is a simple webpage created using HTML, CSS, and JavaScript.
      It includes a heading, paragraph, image, link, and button.
    </p>

    <img
      src="[via.placeholder.com](https://via.placeholder.com/300x180.png?text=My+Image)"
      alt="Sample placeholder image"
    />

    <p>
      Visit
      <a href="[google.com](https://www.google.com)" target="_blank">Google</a>
      to explore more.
    </p>

    <button id="alertButton">Click Me</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
